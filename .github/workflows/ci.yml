name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # mediasoup-sys builds the C++ worker: needs python3 + pip (meson/ninja
      # are fetched by its build script) and a full C++ toolchain
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-pip cmake

      - name: Install Rust (rust-toolchain.toml is respected by rustup)
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --bins

      # Media tests bind fixed UDP ports (40000+): must run single-threaded
      - name: Test
        run: cargo test -- --test-threads=1

  web:
    name: Web client typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx vite build
